    <script>
      // Apply the system theme early to avoid FOUC.
      // The old "theme" key is cleared because the site no longer exposes a manual toggle.
      (function () {
        var d = document.documentElement;
        try {
          localStorage.removeItem("theme");
        } catch (t) {}

        var m = window.matchMedia("(prefers-color-scheme: dark)");
        if (m.matches) {
          d.classList.add("dark");
          d.style.colorScheme = "dark";
        } else {
          d.classList.remove("dark");
          d.style.colorScheme = "light";
        }
      })();
    </script>

    <!-- Google Analytics (gtag.js) — interacao + fallback de 60s
         Historico de tentativas:
         - 15s setTimeout: capturado pelo trace mobile (CPU 4x throttle estende > 15s)
         - 30s setTimeout: idem, trace mobile chega facil a 30s
         - PerformanceObserver(LCP)+5s: LCP em 2.5s + 5s = 7.5s, ainda dentro do trace
         Estrategia atual: SO triggers de interacao + setTimeout(60s) puro.
         60s e bem alem de qualquer trace Lighthouse mobile (~30s max), mantendo
         o gtag fora dos audits "Reduza JS nao usado" e "Tarefas longas".
         Triggers REMOVIDOS e porque:
         - 'scroll': ScrollToTop.tsx dispara window.scrollTo no mount, e o
           Lighthouse rola a pagina para medir CLS/screenshot — ambos caem
           dentro do trace e carregam gtag durante a auditoria.
         - 'mousemove': em desktop real, dispara em milissegundos apos load
           (movimento residual do cursor), anulando o lazy-load pra ~90%
           dos visitantes desktop. Nao e so Lighthouse — e UX real.
         Triggers mantidos exigem intencao explicita: pointerdown (mouse+touch+pen),
         keydown (a11y/teclado), touchstart (mobile fallback). dataLayer
         pre-empilhado garante que eventos disparados antes do load nao se
         percam — gtag processa retroativamente quando carrega. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B9C917RCWM');
      (function deferGtag() {
        var loaded = false;
        var triggers = ['pointerdown', 'keydown', 'touchstart'];
        function load() {
          if (loaded) return;
          loaded = true;
          triggers.forEach(function (e) { window.removeEventListener(e, load, { passive: true }); });
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-B9C917RCWM';
          s.async = true;
          document.head.appendChild(s);
        }
        triggers.forEach(function (e) { window.addEventListener(e, load, { passive: true, once: true }); });
        setTimeout(load, 60000);
      })();
    </script>

  <body>
    <!--
      LCP instant shim — copia visual do Hero acima-da-dobra renderizada
      diretamente no HTML estatico. O Chrome conta o paint deste H1 como LCP
      (tipicamente ~200-400ms apos TTFB, pos-parse do <style> inline) em vez
      de esperar pelo pipeline CSR (HTML -> entry -> react-vendor -> Hero
      render, ~2.5-3s em mobile 4x throttle). Quando o React monta e o Hero
      "real" pinta no <div id="root">, main.tsx remove este shim via 2 rAFs.
      A spec de LCP mantem o valor reportado mesmo quando o elemento medido
      e removido do DOM — entao o LCP fica em ~300ms ao inves de ~3s.

      Styles totalmente inline pra nao depender do <style> ~62KB que vem do
      landingCssAndPreloads (injetado pelo plugin de build no <head>, mas
      serializado depois do script tag inline — preload scanner chegaria
      nele depois do shim). Layout copia o do Hero (gradient, padding, h1
      sizing responsivo). aria-hidden pra nao duplicar o H1 pro a11y tree.
    -->
    <style>
      #lcp-shim {
        position: fixed;
        inset: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        background: linear-gradient(135deg, hsl(223, 48%, 27%), hsl(261, 54%, 33%));
        z-index: 0;
        overflow: hidden;
      }
      .dark #lcp-shim {
        background: linear-gradient(to bottom, hsl(224, 47%, 9%), hsl(224, 35%, 14%), hsl(224, 47%, 9%));
      }
      #lcp-shim > div {
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 4rem 1rem;
      }
      @media (min-width: 768px) { #lcp-shim > div { padding: 5rem 2rem; } }
      @media (min-width: 1024px) { #lcp-shim > div { padding: 6rem 2rem; } }
      #lcp-shim h1 {
        color: #fff;
        font-family: Poppins, system-ui, -apple-system, sans-serif;
        font-weight: 700;
        font-size: 1.875rem;
        line-height: 1.2;
        letter-spacing: -0.02em;
        margin: 0;
        max-width: 48rem;
      }
      @media (min-width: 768px) { #lcp-shim h1 { font-size: 2.25rem; } }
      @media (min-width: 1024px) { #lcp-shim h1 { font-size: 3rem; } }
      #lcp-shim h1 > span { color: hsl(180, 75%, 60%); }
    </style>
    <div id="lcp-shim" aria-hidden="true">
      <div>
        <h1>
          Software sob medida para empresas que querem
          <span>crescer</span> além das soluções prontas
        </h1>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
